<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ring Ceremony Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&display=swap');

        body {
            background-color: #fdfaf0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border: 15px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            border-image: url("https://www.transparenttextures.com/patterns/gold-dust.png");
        }

        .image-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .image-container img {
            max-width: 45%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .ornament {
            color: #d4af37;
            font-size: 24px;
            margin-bottom: 10px;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: #aa8b1e;
            margin: 10px 0;
        }

        .names {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #333;
            margin: 20px 0;
        }

        .and {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            color: #d4af37;
        }

        .details {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 20px 0;
            margin: 20px 0;
        }

        .venue {
            font-weight: 600;
            color: #555;
            margin-top: 10px;
        }

        .footer {
            font-style: italic;
            color: #888;
            font-size: 0.9rem;
        }

        .ring-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="image_0.png" alt="Couple with bike - Pose 1">
        <img src="image_1.png" alt="Couple with bike - Pose 2">
    </div>
    <div class="ornament">✿</div>
    <div class="ring-icon">💍</div>
    <p style="letter-spacing: 3px; text-transform: uppercase; font-size: 0.8rem; color: #666;">We Request the Honor of Your Presence at the</p>
    <h2>Ring Ceremony</h2>
    <p>of</p>
    
    <div class="names">
        Ashwini Solanki<br>
        <span class="and">&</span><br>
        Ankita Tanwar
    </div>

    <div class="details">
        <p>Please join us for an evening of love and celebration</p>
        <div class="venue">
            Mali Samaj Bhavan<br>
            Gangasahar Road, Bikaner
        </div>
    </div>

    <div class="footer">
        With Best Compliments From:<br>
        <strong>Solanki & Tanwar Families</strong>
    </div>
</div>

</body>
</html>
